version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: banking_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      DATABASE_URL: postgresql+asyncpg://banking_user:SecureBankingPass2024!@db:5432/banking_workflow
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - banking_net
    volumes:
      - ./logs:/app/logs

  db:
    image: postgres:16-alpine
    container_name: banking_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: banking_workflow
      POSTGRES_USER: banking_user
      POSTGRES_PASSWORD: SecureBankingPass2024!
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - banking_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U banking_user -d banking_workflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: banking_migrate
    command: ["alembic", "upgrade", "head"]
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - banking_net
    restart: "no"

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: banking_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@bank.com
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - db
    networks:
      - banking_net

networks:
  banking_net:
    driver: bridge

volumes:
  postgres_data:
  pgadmin_data: